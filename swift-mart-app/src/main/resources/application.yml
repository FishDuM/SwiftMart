server:
  port: 8911

spring:
  # 排除 Redisson 自动配置，避免与 Lettuce RedisConnectionFactory 冲突
  autoconfigure:
    exclude: org.redisson.spring.starter.RedissonAutoConfigurationV2
  # 只需要改这一个值，就能切换整个环境的配置
  profiles:
    active: local # 激活哪个环境：dev=本地开发，prod=生产
  # MySQL 数据源配置
  datasource:
    # 连接地址：数据库名为 swift_mart
    url:
    # 数据库用户名
    username:
    # 数据库密码
    password:
    # 数据库驱动类名
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置
    hikari:
      # 连接池名称
      pool-name: SeckillHikariPool
      # 最小空闲连接数
      minimum-idle: 10
      # 最大连接数
      maximum-pool-size: 50
      # 空闲连接超时时间（毫秒）
      idle-timeout: 300000
      # 连接最大存活时间（毫秒）
      max-lifetime: 900000
      # 获取连接超时时间（毫秒）
      connection-timeout: 30000
      # 连接测试语句
      connection-test-query: SELECT 1
#  data:
#    redis:
#      timeout: 5000
#      # Lettuce 连接池配置（提升连接复用效率）
#      lettuce:
#        pool:
#          # 连接池最大连接数
#          max-active: 20
#          # 连接池最大空闲连接数
#          max-idle: 10
#          # 连接池最小空闲连接数
#          min-idle: 5
#          # 连接池最大阻塞等待时间（毫秒），-1 表示无限制
#          max-wait: 3000
#    rabbitmq: # RabbitMQ 配置
#      host: # RabbitMQ 服务器地址
#      port: 5672 # AMQP 协议端口
#      username:  # 用户名
#      password:  # 密码
#      virtual-host: # 虚拟主机
#      connection-timeout: 15000 # 连接超时时间（毫秒）

  # 自定义线程池配置
thread-pool:
  # 核心线程数
  core-pool-size: 2
  # 最大线程数
  max-pool-size: 5
  # 队列容量
  queue-capacity: 100
  # 空闲线程存活时间（秒）
  keep-alive-seconds: 60

mybatis:
  # MyBatis xml 配置文件路径
  mapper-locations: classpath:/mapper/**/*.xml

# 行为验证码配置
captcha:
  # Redis 的 key 的前缀
  prefix: captcha
  expire: # 验证码过期时间，默认是2分钟,单位毫秒
    default: 10000 # 默认缓存时间 2分钟
    WORD_IMAGE_CLICK: 20000 # 针对 点选验证码 过期时间设置为 2分钟， 因为点选验证码验证比较慢，把过期时间调整大一些
  secondary:
    enabled: true # 二次验证，开启后支持在登录时进行验证码二次校验
    expire: 120000 # 二次验证过期时间，默认 2 分钟
    keyPrefix: "captcha:secondary" # 二次验证缓存 Key 前缀
  # 初始化默认模板资源（滑块形状等）
  init-default-resource: true
  # 缓存控制， 默认为 false 不开启
  local-cache-enabled: true
  # 验证码会提前缓存一些生成好的验证数据， 默认是 20
  local-cache-size: 20


sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: Authorization
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: true
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # token 前缀（前端提交 Token 时需要带上此前缀）
  token-prefix: Bearer
  # 是否输出操作日志
  is-log: true

logging:
  level:
    root: info